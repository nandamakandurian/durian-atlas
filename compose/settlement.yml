x-host-gateway: &host-gateway
  extra_hosts:
    - host.docker.internal:host-gateway

services:
  settlement-service-api:
    <<: *host-gateway
    build:
      context: ${SETTLEMENT_SERVICE_DIR:?SETTLEMENT_SERVICE_DIR is required}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    environment:
      APP_NAME: settlement-service
      APP_PORT: 8080
      METRICS_PORT: 9090
      GRPC_ADDR: :50061
      KAFKA_CLIENT_ID: settlement-service-api
      CONSUL_SETTLEMENT_SERVICE_CONFIG_PATH: settlement_service/local
    command: ["/app/settlement_service", "start"]
    ports:
      - "8080:8080"
      - "9090:9090"
      - "50061:50061"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  settlement-service-consumer:
    <<: *host-gateway
    build:
      context: ${SETTLEMENT_SERVICE_DIR:?SETTLEMENT_SERVICE_DIR is required}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    environment:
      APP_NAME: settlement-service-consumer
      APP_PORT: 8080
      METRICS_PORT: 9090
      GRPC_ADDR: :50061
      KAFKA_CLIENT_ID: settlement-service-consumer
      CONSUL_SETTLEMENT_SERVICE_CONFIG_PATH: settlement_service/local
    command: ["/app/settlement_service", "consumer"]
